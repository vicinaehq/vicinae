name: Build AppImage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: depot-ubuntu-24.04-16
    container: registry.depot.dev/${{ vars.DEPOT_PROJECT_ID }}:appimage-amd64-latest
    env:
      INSTALL_DIR: ${{ github.workspace }}/install
      # linuxdeploy runs AppImages; the container has no FUSE, so extract-and-run.
      APPIMAGE_EXTRACT_AND_RUN: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: appimage-amd64
          max-size: 0

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja              \
          -DCMAKE_BUILD_TYPE=Release                \
          -DCMAKE_INSTALL_PREFIX="${INSTALL_DIR}"

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install
        run: cmake --install build

      - name: Make AppImage
        run: |
          chmod +x ./scripts/mkappimage.sh
          ./scripts/mkappimage.sh "${INSTALL_DIR}" AppDir

