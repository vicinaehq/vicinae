name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: depot-windows-2022-16
    name: Build (Windows / MSVC x64)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.1
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools qtimageformats
          cache: true

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: windows-ci

      - name: Configure
        run: >
          cmake --preset windows-ci
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset windows-ci

      - name: Package (stage + installer)
        run: ./scripts/mkinstaller.ps1 -BuildDir build

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: vicinae-windows-x64-portable
          path: build/stage

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: vicinae-windows-x64-setup
          path: dist/*.exe

      - name: sccache stats
        if: always()
        run: sccache --show-stats
