name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: depot-windows-2022-16
    name: Build (Windows / MSVC x64)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.1
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools qtsvg qtimageformats
          cache: true

      - name: Configure
        run: cmake --preset windows-ci

      - name: Build
        run: cmake --build --preset windows-ci
